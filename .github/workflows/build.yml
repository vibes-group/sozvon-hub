name: Build and deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Backend checks
        working-directory: backend
        run: |
          go vet ./...
          go build ./...
          go test ./...

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/sozvon-hub-app
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=sozvon-hub-app
          cache-to: type=gha,scope=sozvon-hub-app,mode=max

  write-env:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: vibes-group/infra
          ref: master

      - uses: ./.github/actions/write-env
        with:
          app: sozvon-hub
          deploy-host:    ${{ secrets.DEPLOY_HOST }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key:       ${{ secrets.DEPLOY_HOST_KEY }}
          env: |
            IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            APP_HOSTNAME=${{ secrets.SOZVON_HUB_HOST }}
            PUBLIC_IP=${{ secrets.DEPLOY_HOST }}

  deploy:
    needs: [build, write-env]
    permissions:
      contents: read
    uses: vibes-group/infra/.github/workflows/deploy.yml@master
    with:
      app: sozvon-hub
    secrets:
      DEPLOY_HOST:     ${{ secrets.DEPLOY_HOST }}
      DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
